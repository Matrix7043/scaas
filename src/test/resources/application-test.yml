spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata

  jackson:
    time-zone: Asia/Kolkata

  h2:
    console:
      enabled: false

app:
  storage:
    base-path: storage-test