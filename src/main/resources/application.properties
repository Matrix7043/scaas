spring.application.name=scaas
jwt.secret=your-256-bit-secret-key-here-make-it-at-least-32-bytes-long
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000
spring.data.web.pageable.max-page-size= 100
spring.data.web.pageable.default-page-size= 20
app.storage.base-path=storage
runner.base-url=http://localhost:8080
server.port=8081

# Database Connections
spring.datasource.url=jdbc:postgresql://localhost:5431/postgres
spring.datasource.username=postgres
spring.datasource.password=changemeinprod!
logging.level.org.springframework.security=DEBUG

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# TimeZone Configuration
spring.jackson.time-zone=Asia/Kolkata
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata